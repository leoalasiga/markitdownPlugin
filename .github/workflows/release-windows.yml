name: Release Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to upload the EXE asset to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build and upload Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build EXE
        run: python -m PyInstaller --clean markitdown_tool.spec

      - name: Prepare release asset
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $safeTag = $tag -replace "[^A-Za-z0-9._-]", "-"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item dist\MarkItDownTool.exe "release-assets\MarkItDownTool-$safeTag-windows-x64.exe"

      - name: Upload EXE to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          gh release upload "$env:RELEASE_TAG" `
            release-assets\*.exe `
            --repo "${{ github.repository }}" `
            --clobber
