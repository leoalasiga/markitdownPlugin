name: Release Windows EXE

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build and upload Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build EXE
        run: python -m PyInstaller --clean markitdown_tool.spec

      - name: Prepare release asset
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $safeTag = $tag -replace "[^A-Za-z0-9._-]", "-"
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item dist\MarkItDownTool.exe "release-assets\MarkItDownTool-$safeTag-windows-x64.exe"

      - name: Upload EXE to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            release-assets\*.exe `
            --repo "${{ github.repository }}" `
            --clobber
